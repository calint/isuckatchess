<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="lib/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 1200px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 2rem;
      padding: 2rem;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
      transition: opacity 0.2s;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      height: 300px;
      width: 100%;
      /* Occupy full parent width */
      box-sizing: border-box;
      /* Include padding in width calculation */
      overflow-y: auto;
      overflow-x: hidden;
      /* Prevent horizontal scrolling */
      background: #222;
      color: #00ff00;
      padding: 0.8rem;
      border-radius: 4px;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre-wrap;
      /* Wrap long lines instead of pushing width */
      word-break: break-all;
      /* Force break very long strings */
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      height: fit-content;
      min-width: 0;
      /* Allows the panel to shrink/fit grid correctly */
    }

    .puzzle-item {
      padding: 0.8rem;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
      cursor: pointer;
    }

    .puzzle-item:hover {
      background: #f9f9f9;
    }

    .board-container {
      display: flex;
      gap: 15px;
      align-items: stretch;
      margin: 1rem 0;
    }

    #eval-bar {
      width: 30px;
      background: #444;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    #eval-fill {
      width: 100%;
      height: 50%;
      background: #eee;
      position: absolute;
      bottom: 0;
      transition: height 0.3s ease;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .badge {
      font-weight: bold;
      color: var(--primary);
      font-size: 0.7rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Blindspot Trainer</h1>
  </header>
  <main>
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <section class="panel">
        <div style="display:flex; gap:0.5rem">
          <input id="player" type="text" value="calint" style="flex:2">
          <button id="btnReload" style="flex:0.5; background: #607d8b;">↻</button>
          <select id="year" style="flex:1"></select>
          <select id="month" style="flex:1"></select>
        </div>
        <button id="btnLoad">Fetch Games</button>
        <select id="gameList" size="6"></select>
        <div class="settings-row">
          <div style="flex: 2;"><label style="font-size: 0.8rem; font-weight: 700;">Lookahead:</label>
            <select id="lookahead">
              <option value="5">5 moves</option>
              <option value="8">8 moves</option>
              <option value="12" selected>12 moves</option>
            </select>
          </div>
          <div style="flex: 1;"><label style="font-size: 0.8rem; font-weight: 700;">Margin (CP):</label>
            <input id="margin" type="number" value="250">
          </div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button id="btnAnalyze" style="flex: 2; background: #2e7d32;">Analyze Selected</button>
          <button id="btnBatch" style="flex: 2; background: #1565c0;">Batch All</button>
          <button id="btnStop" style="flex: 1; background: #c62828; display: none;">Stop</button>
        </div>
        <div id="log">Ready.</div>
        <button id="btnClearLog" style="background: #455a64; margin-top: 5px; font-size: 0.8rem;">Clear Log</button>
      </section>
    </div>

    <section class="panel">
      <div id="puzzle-header"
        style="background: #333; color: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; border-left: 4px solid #ffca28;">
        <div id="ph-players" style="font-weight: bold; font-size: 1.1rem;"></div>
        <div id="ph-meta" style="color: #aaa; font-size: 0.8rem;"></div>
        <div id="ph-eval" style="color: #ffca28; font-weight: bold;"></div>
      </div>
      <div id="hint" style="background: #fff9c4; padding: 0.5rem; border-radius: 4px;">Select a puzzle...</div>
      <div class="board-container">
        <div id="eval-bar">
          <div id="eval-fill"></div>
        </div>
        <div id="board"></div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="btnPrev">Step Back</button>
        <button id="btn-hint">Get Hint</button>
        <button id="btnNext">Step Forward</button>
      </div>
      <button id="btnSolution" style="display:none; margin-top: 10px;">Show Solution</button>
      <div id="solutionText"
        style="margin-top: 1rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; border: 1px solid #0b4a6f;">
      </div>
      <div id="puzzles" style="margin-top: 2rem;"></div>
    </section>
  </main>

  <script src="lib/jquery-3.6.0.min.js"></script>
  <script src="lib/chessboard-1.0.0.min.js"></script>
  <script src="lib/chess.min.js"></script>

  <script>
    const UI = {
      player: document.getElementById('player'),
      year: document.getElementById('year'),
      month: document.getElementById('month'),
      gameList: document.getElementById('gameList'),
      log: document.getElementById('log'),
      hint: document.getElementById('hint'),
      evalFill: document.getElementById('eval-fill'),
      puzzleHeader: document.getElementById('puzzle-header'),
      phPlayers: document.getElementById('ph-players'),
      phMeta: document.getElementById('ph-meta'),
      phEval: document.getElementById('ph-eval'),
      puzzles: document.getElementById('puzzles'),
      solutionText: document.getElementById('solutionText'),
      btnStop: document.getElementById('btnStop'),
      btnBatch: document.getElementById('btnBatch'),
      btnSolution: document.getElementById('btnSolution')
    };

    const state_ = { engine: null, board: null, current_puzzle: null, training_game: new Chess(), isBatchRunning: false };

    function init() {
      state_.board = Chessboard('board', { position: 'start', pieceTheme: 'img/chesspieces/wikipedia/{piece}.png' });
      document.getElementById('btn-hint').onclick = onShowHint;
      document.getElementById('btnReload').onclick = onLoadArchives;
      document.getElementById('btnLoad').onclick = onLoadGames;
      document.getElementById('btnAnalyze').onclick = onAnalyze;
      document.getElementById('btnBatch').onclick = onBatch;
      document.getElementById('btnClearLog').onclick = onClearLog;
      UI.btnStop.onclick = onStop;
      UI.btnSolution.onclick = onSolution;
      document.getElementById('btnPrev').onclick = onStepBack;
      document.getElementById('btnNext').onclick = onStepForward;
      onLoadArchives();
      renderSavedPuzzles();
    }

    function onClearLog() {
      UI.log.innerHTML = "Ready.";
    }

    function onAnalyze() {
      const sel = UI.gameList.selectedOptions[0];
      if (!sel) return;

      const { gameId } = sel.dataset;
      const currentDepth = parseInt(UI.lookahead?.value || 12);
      const currentMargin = parseInt(document.getElementById('margin').value);

      // Check if we already have a puzzle with these exact settings
      const existingPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const savedPuzzle = existingPuzzles.find(p =>
        p.gameId === gameId &&
        p.depth === currentDepth &&
        p.margin === currentMargin &&
        p.gain !== null // Ensure it's a puzzle, not just a "clean" record
      );

      if (savedPuzzle) {
        log(`Match found in local storage (Depth ${currentDepth}, Margin ${currentMargin}). Loading...`, true);
        showPuzzle(savedPuzzle);
      } else {
        // No match? Run the actual engine analysis
        runAnalysis(false);
      }
    }

    function onStop() {
      state_.isBatchRunning = false;
      log("Stopping... please wait for current game to finish.");
    }

    // --- Navigation ---
    function onStepBack() {
      state_.training_game.undo(); // Undo engine reply
      state_.training_game.undo(); // Undo player move
      updateUI();
    }

    // --- Navigation Fix: Smooth Sliding ---
    async function onStepForward() {
      const p = state_.current_puzzle;
      if (!p) return;
      const sol = p.solution.split(" ");
      let cur = state_.training_game.history().length;

      if (cur < sol.length) {
        // 1. Play Player Move
        state_.training_game.move(sol[cur]);
        state_.board.position(state_.training_game.fen()); // Force slide for player move
        cur++;

        // 2. Wait for animation, then play Computer Reply
        if (cur < sol.length) {
          await new Promise(r => setTimeout(r, 600)); // Match or exceed board transition speed
          state_.training_game.move(sol[cur]);
          updateUI(); // This handles the second slide/jump and status
        } else {
          updateUI();
        }
      }
    }


    // --- Data Fetching & Helpers ---
    async function onLoadArchives() {
      UI.gameList.innerHTML = "";
      const user = UI.player.value.trim();
      if (!user) return;
      const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
      const data = await res.json();
      const archives = data.archives.map(url => {
        const p = url.split('/');
        return { year: p[p.length - 2], month: p[p.length - 1] };
      }).sort((a, b) => b.year - a.year || b.month - a.month);

      UI.year.innerHTML = "";
      [...new Set(archives.map(a => a.year))].forEach(y => UI.year.add(new Option(y, y)));
      UI.year.onchange = () => {
        UI.month.innerHTML = "";
        archives.filter(a => a.year === UI.year.value).forEach(a => UI.month.add(new Option(a.month, a.month)));
      };
      UI.year.onchange();
    }

    async function onLoadGames() {
      const res = await fetch(`https://api.chess.com/pub/player/${UI.player.value}/games/${UI.year.value}/${UI.month.value}`);
      const data = await res.json();
      UI.gameList.innerHTML = "";

      data.games.reverse().forEach((g, i) => {
        const gameId = btoa(`${g.white.username}-${g.black.username}-${g.end_time}`).substring(0, 16);
        const opt = new Option("", i); // Text set by updateGameListStatus

        Object.assign(opt.dataset, {
          pgn: g.pgn,
          gameId: gameId,
          date: new Date(g.end_time * 1000).toLocaleDateString(),
          whiteName: g.white.username,
          blackName: g.black.username,
          wR: g.white.rating || "?",
          bR: g.black.rating || "?"
        });
        UI.gameList.add(opt);
      });

      updateGameListStatus(); // Apply emojis immediately
    }

    function onShowHint() {
      const p = state_.current_puzzle;
      if (!p) return;

      const sol = p.solution.split(" ");
      const cur = state_.training_game.history().length;

      // If we've reached the end of the solution, don't show a hint
      if (cur >= sol.length) return;

      const temp = new Chess(state_.training_game.fen());
      const move = temp.move(sol[cur]);

      if (move) {
        // Map the single character to the full name
        const pieceNames = {
          'p': 'pawn',
          'n': 'knight',
          'b': 'bishop',
          'r': 'rook',
          'q': 'queen',
          'k': 'king'
        };

        const fullName = pieceNames[move.piece] || 'piece';
        UI.hint.innerHTML = `<strong>Hint:</strong> Move the <u>${fullName}</u> on <strong>${move.from}</strong>`;
      }
    }

    async function onSolution() {
      const sol = state_.current_puzzle.solution.split(" ");
      state_.training_game.load(state_.current_puzzle.fen);
      for (const m of sol) {
        await new Promise(r => setTimeout(r, 500));
        state_.training_game.move(m);
        updateUI();
      }
    }

    async function onBatch() {
      const options = Array.from(UI.gameList.options);
      if (options.length === 0) return;

      state_.isBatchRunning = true;
      toggleAnalysisUI(true);

      log(`Starting batch analysis of ${options.length} games...`, true);

      for (let i = 0; i < options.length; i++) {
        if (!state_.isBatchRunning) break;

        // Auto-select the game in the UI list so the user sees progress
        UI.gameList.selectedIndex = i;

        // CRITICAL FIX: Pass the counters (i + 1) and total length
        await runAnalysis(true, i + 1, options.length);
      }

      state_.isBatchRunning = false;
      toggleAnalysisUI(false);
      UI.hint.textContent = "Batch complete. Select a puzzle to begin.";
    }

    async function updateUI() {
      const p = state_.current_puzzle;
      if (!p) return;

      const fen = state_.training_game.fen();
      state_.board.position(fen);

      // Get current eval to move the bar
      const analysis = await evaluate(fen, 10); // Low depth for speed
      updateEvalBar(analysis.score);

      const sol = p.solution.split(" ");
      const curIdx = state_.training_game.history().length;
      const totalPlayerMoves = Math.ceil(sol.length / 2);
      const currentPlayerMove = Math.floor(curIdx / 2) + 1;

      if (curIdx >= sol.length) {
        UI.hint.innerHTML = "<span style='color:green; font-weight:bold;'>✔ Puzzle Complete!</span>";
        markSolved(p.id);
      } else {
        UI.hint.innerHTML = `<strong>Your Turn:</strong> Move ${currentPlayerMove} of ${totalPlayerMoves}`;
      }
      state_.board.position(state_.training_game.fen());
    }

    function updateEvalBar(cp) {
      // 50% is equal. +2000 CP (mate threat/huge lead) is 100%, -2000 CP is 0%
      const p = Math.max(0, Math.min(100, 50 + (cp / 40)));
      UI.evalFill.style.height = p + "%";
    }

    function toggleAnalysisUI(isAnalyzing) {
      // Select specific navigation and action buttons
      const elements = [
        document.getElementById('btnAnalyze'),
        document.getElementById('btnBatch'),
        document.getElementById('btnLoad'),
        document.getElementById('btnReload'),
        document.getElementById('btnPrev'),
        document.getElementById('btn-hint'),
        document.getElementById('btnNext'),
        document.getElementById('btnSolution'),
        UI.player, UI.year, UI.month, UI.gameList,
        document.getElementById('lookahead'),
        document.getElementById('margin')
      ];

      // Hide the labels in the settings row
      const labels = document.querySelectorAll('.settings-row label');

      elements.forEach(el => {
        if (el) el.style.display = isAnalyzing ? 'none' : 'block';
      });

      labels.forEach(lbl => {
        lbl.style.display = isAnalyzing ? 'none' : 'block';
      });

      // Only show Stop during analysis
      UI.btnStop.style.display = isAnalyzing ? 'block' : 'none';
    }

    function markSolved(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = items.find(x => x.id === id);
      if (p && !p.solved) {
        p.solved = true;
        localStorage.setItem('chess_puzzles', JSON.stringify(items));
        renderSavedPuzzles();
        log(`Completed: ${p.players}`, true);
      }
    }

    function deletePuzzle(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const filtered = items.filter(p => p.id !== id);
      localStorage.setItem('chess_puzzles', JSON.stringify(filtered));
      renderSavedPuzzles();

      // Clear the board if we deleted the currently active puzzle
      if (state_.current_puzzle && state_.current_puzzle.id === id) {
        state_.current_puzzle = null;
        state_.board.start();
        UI.hint.textContent = "Select a puzzle...";
        UI.puzzleHeader.style.display = 'none';
      }
    }

    // Helper to bridge the click to showPuzzle
    function loadPuzzleById(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = items.find(x => x.id === id);
      if (p) showPuzzle(p);
    }

    // --- Analysis & Engine ---
    async function getEngine() {
      if (state_.engine) return state_.engine;
      state_.engine = new Worker("lib/stockfish.js");
      return state_.engine;
    }

    async function evaluate(fen, depth) {
      const engine = await getEngine();
      const side = fen.split(" ")[1];

      return new Promise(resolve => {
        let lastScore = 0;
        let lastPv = "";

        const onMsg = (e) => {
          if (e.data.includes("score")) {
            const cpMatch = e.data.match(/score cp (-?\d+)/);
            if (cpMatch) {
              lastScore = parseInt(cpMatch[1]) * (side === 'b' ? -1 : 1);
            }

            const mateMatch = e.data.match(/score mate (-?\d+)/);
            if (mateMatch) {
              const mateIn = parseInt(mateMatch[1]);
              // High constant for mate, adjusted for side
              const mateValue = (mateIn === 0) ? 100000 : 20000;
              lastScore = (mateIn >= 0 ? mateValue : -mateValue) * (side === 'b' ? -1 : 1);
            }

            const pvMatch = e.data.match(/ pv (.+)/);
            if (pvMatch) lastPv = pvMatch[1];
          }

          // Handle the "Game Over" bestmove
          if (e.data.startsWith("bestmove")) {
            const move = e.data.split(" ")[1];
            engine.removeEventListener("message", onMsg);

            // If move is "(none)", it's checkmate or stalemate
            resolve({
              score: lastScore,
              best: move === "(none)" ? null : move,
              pv: lastPv
            });
          }
        };

        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    // --- Game Logic ---
    async function showPuzzle(p) {
      state_.current_puzzle = p;
      state_.training_game.load(p.fen);
      UI.puzzleHeader.style.display = 'block';
      UI.phPlayers.textContent = p.players;
      UI.phMeta.textContent = `${p.date} | Side: ${p.side.toUpperCase()}`;
      UI.phEval.textContent = `Improve position by ${p.gain}`;
      UI.solutionText.style.display = 'none';
      UI.btnSolution.style.display = 'block';

      const sol = p.solution.split(" ");
      state_.board = Chessboard('board', {
        draggable: true, position: p.fen, orientation: p.side, pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
        onDrop: (s, t) => {
          const history = state_.training_game.history().length;
          const move = new Chess(state_.training_game.fen()).move({ from: s, to: t, promotion: 'q' });
          if (!move || move.san !== sol[history]) return 'snapback';

          state_.training_game.move(move.san);

          const nextIdx = state_.training_game.history().length;

          if (nextIdx < sol.length) {
            setTimeout(() => {
              state_.training_game.move(sol[nextIdx]);
              updateUI();
            }, 500);
          } else {
            updateUI();
          }
        }
      });
      updateUI();
    }

    function log(msg, isHeader = false) {
      const div = document.createElement('div');
      if (isHeader) div.style.color = '#fff';
      div.textContent = `> ${msg}`;
      UI.log.appendChild(div);
      UI.log.scrollTop = UI.log.scrollHeight;
    }

    async function runAnalysis(isBatch = false, gameIdx = 1, totalGames = 1) {
      const sel = UI.gameList.selectedOptions[0];
      if (!sel) return;

      // Ensure we use the passed counters for display
      const displayIdx = isBatch ? gameIdx : 1;
      const displayTotal = isBatch ? totalGames : 1;

      // 1. UI Lockdown & State Setup
      if (!isBatch) toggleAnalysisUI(true);
      let newlySavedPuzzleId = null;

      try {
        const { pgn, gameId, date, whiteName, blackName, wR, bR } = sel.dataset;
        const currentDepth = parseInt(UI.lookahead?.value || 12);
        const currentMargin = parseInt(document.getElementById('margin').value);
        const playerDisplay = `${whiteName} (${wR}) vs ${blackName} (${bR})`;

        // Header Log
        log("------------------------------------------", true);
        log(`ANALYZING [${displayIdx}/${displayTotal}]: ${playerDisplay}`, true);

        // 2. Skip Logic (If settings match saved record)
        const existingPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
        const savedPuzzle = existingPuzzles.find(p => p.gameId === gameId);

        if (isBatch && savedPuzzle) {
          if (savedPuzzle.depth === currentDepth && savedPuzzle.margin === currentMargin) {
            log(`SKIPPING: Settings match existing record.`);
            updateGameListStatus();
            return;
          }
        }

        // 3. Game Initialization
        const game = new Chess();
        if (!game.load_pgn(pgn)) {
          log("ERROR: Could not parse PGN.");
          return;
        }

        const user = UI.player.value.toLowerCase();
        const uSide = blackName.toLowerCase() === user ? 'black' : 'white';
        const history = game.history({ verbose: true });
        const tracker = new Chess();
        let moveCount = 0;

        state_.board.orientation(uSide);
        state_.board.position('start');

        // 4. Analysis Loop
        for (const move of history) {
          if (isBatch && !state_.isBatchRunning) return;
          moveCount++;

          // Update Live Progress in Hint Box
          const prog = Math.round((moveCount / history.length) * 100);
          UI.hint.innerHTML = `
        <div style="font-weight:bold;">Game ${displayIdx} of ${displayTotal}</div>
        <div style="font-size: 0.85rem;">${playerDisplay}</div>
        <small>Move ${moveCount}/${history.length} (${prog}%)</small>
      `;

          // Check if game is already over (prevents engine hang)
          if (tracker.game_over()) break;

          const fenBefore = tracker.fen();
          const turn = tracker.turn() === 'w' ? 'white' : 'black';

          // Evaluate position BEFORE the move
          const analysis = await evaluate(fenBefore, currentDepth);

          // Execute the move in our tracker
          tracker.move(move);
          state_.board.position(tracker.fen());

          // Evaluate position AFTER the move
          let post;
          if (tracker.in_checkmate()) {
            // Assign massive score for checkmate to avoid engine deadlock
            post = { score: (tracker.turn() === 'b' ? 100000 : -100000) };
          } else if (tracker.in_draw() || tracker.in_stalemate()) {
            post = { score: 0 };
          } else {
            post = await evaluate(tracker.fen(), currentDepth);
          }

          updateEvalBar(post.score);

          // 5. Blindspot Calculation
          const gap = (turn === 'white' ? 1 : -1) * (analysis.score - post.score);

          if (turn === uSide && gap >= currentMargin) {
            log(`[!] BLINDSPOT: Move ${moveCount} (${move.san}) | Loss: ${gap}cp`, true);

            newlySavedPuzzleId = Date.now();
            savePuzzle({
              gameId,
              fen: fenBefore,
              side: turn,
              gain: `${gap} CP`,
              id: newlySavedPuzzleId,
              solution: convertPvToAlgebraic(fenBefore, analysis.pv),
              players: playerDisplay,
              date,
              depth: currentDepth,
              margin: currentMargin
            });
            updateGameListStatus();
            return; // Stop analyzing this game once a blindspot is found
          }
        }

        // 6. Save "Clean" record if no blindspot found
        savePuzzle({
          gameId, players: playerDisplay, gain: null,
          depth: currentDepth, margin: currentMargin, date
        });
        log(`COMPLETE: Checked ${moveCount} moves.`, true);
        updateGameListStatus();

      } catch (err) {
        log(`FATAL ERROR: ${err.message}`);
        console.error(err);
      } finally {
        // 7. UI Restoration & Auto-Load
        if (!isBatch) {
          toggleAnalysisUI(false);

          if (newlySavedPuzzleId) {
            const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
            const puzzle = items.find(x => x.id === newlySavedPuzzleId);
            if (puzzle) {
              showPuzzle(puzzle);
              log("Blindspot found! Puzzle loaded for training.", true);
            }
          } else {
            UI.hint.textContent = "Analysis complete. No blindspot found.";
          }
        }
      }
    }

    function renderSavedPuzzles() {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]')
        .filter(p => p.gain !== null); // Only show actual puzzles

      UI.puzzles.innerHTML = "<h3>Saved Puzzles</h3>";

      items.sort((a, b) => a.solved - b.solved).forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        div.style.opacity = p.solved ? "0.6" : "1";

        div.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div onclick="loadPuzzleById(${p.id})" style="flex-grow: 1;">
          <strong>${p.players}</strong> ${p.solved ? '✅' : ''}<br>
          <small>${p.gain} | ${p.date} (${p.depth}d)</small>
        </div>
        <button onclick="deletePuzzle(${p.id})" 
                style="width:auto; padding: 4px 10px; background:#c62828; margin-left: 10px;">
          Del
        </button>
      </div>`;
        UI.puzzles.appendChild(div);
      });
    }

    function updateGameListStatus() {
      const puzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');

      Array.from(UI.gameList.options).forEach(opt => {
        const { gameId, date, whiteName, blackName, wR, bR } = opt.dataset;
        const record = puzzles.find(p => p.gameId === gameId);

        let emoji = "";
        if (record) {
          emoji = record.gain ? "+ " : "- ";
        }

        opt.text = `${emoji}${date}: ${whiteName} (${wR}) vs ${blackName} (${bR})`;
      });
    }

    function convertPvToAlgebraic(fen, pv) {
      const temp = new Chess(fen);
      const san = [];
      pv.split(" ").forEach(m => {
        const r = temp.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
        if (r) san.push(r.san);
      });
      return san.join(" ");
    }

    function savePuzzle(p) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').filter(x => x.gameId !== p.gameId);
      items.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(items));
      renderSavedPuzzles();
    }


    window.onload = init;
  </script>
</body>

</html>
