<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 900px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-size: 0.8rem;
      height: 100px;
      overflow-y: auto;
      background: #eee;
      padding: 0.5rem;
      border-radius: 4px;
    }

    .puzzle-item {
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

  <header>
    <h1>Chess Blindspot Trainer</h1>
    <p>Find what you (and your opponents) missed.</p>
  </header>

  <main>
    <section class="panel">
      <h2>1. Load Data</h2>
      <input id="player" type="text" value="calint" placeholder="Username">
      <div style="display:flex; gap:0.5rem">
        <select id="year"></select>
        <select id="month"></select>
      </div>
      <button id="btnLoad">Fetch Games</button>
      <select id="gameList" size="5"></select>
      <hr>
      <h2>2. Settings</h2>
      <label>Threshold (CP): <input id="margin" type="number" value="150"></label>
      <button id="btnAnalyze">Analyze & Find First Blindspot</button>
      <div id="log">Ready.</div>
    </section>

    <section class="panel">
      <h2>3. Training</h2>
      <div id="hint">Select a puzzle to begin...</div>
      <div id="board"></div>
      <button id="btnSolution" style="display:none">Show Solution</button>
      <div id="puzzles"></div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <script>
    /**
     * Global application state.
     */
    const state_ = {
      engine: null,
      board: null,
      current_puzzle: null
    };

    /**
     * Initialize board and UI.
     */
    function init() {
      state_.board = Chessboard('board', {
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
      });
      load_archives();
      render_saved_puzzles();
    }

    /**
     * Log message to the UI.
     */
    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `<div>> ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    /**
     * Fetch engine via Blob to avoid CORS file errors.
     */
    async function get_engine() {
      if (state_.engine) return state_.engine;
      log("Loading Stockfish...");
      const response = await fetch("https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js");
      const blob = new Blob([await response.text()], { type: 'application/javascript' });
      state_.engine = new Worker(URL.createObjectURL(blob));
      state_.engine.postMessage("uci");
      return state_.engine;
    }

    /**
     * Promisified engine evaluation.
     */
    function evaluate(fen, depth) {
      return new Promise(async (resolve) => {
        const engine = await get_engine();
        const onMsg = (e) => {
          if (e.data.startsWith("info depth") && e.data.includes("score cp")) {
            const match = e.data.match(/score cp (-?\d+)/);
            if (match) resolve(parseInt(match[1]));
          }
          if (e.data.startsWith("bestmove")) {
            engine.removeEventListener("message", onMsg);
          }
        };
        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    /**
     * Chess.com data fetching.
     */
    async function load_archives() {
      const user = document.getElementById('player').value;
      try {
        const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
        const data = await res.json();

        // Extract year and month by splitting and taking the last two segments
        // Example URL: .../player/calint/games/2026/03
        const archiveData = data.archives.map(url => {
          const parts = url.split('/');
          return {
            url: url,
            year: parts[parts.length - 2],
            month: parts[parts.length - 1]
          };
        });

        const years = [...new Set(archiveData.map(d => d.year))];
        const ySel = document.getElementById('year');
        ySel.innerHTML = "";
        years.forEach(y => ySel.add(new Option(y, y)));

        ySel.onchange = () => {
          const mSel = document.getElementById('month');
          mSel.innerHTML = "";
          archiveData
            .filter(d => d.year === ySel.value)
            .forEach(d => {
              mSel.add(new Option(d.month, d.month));
            });
        };

        if (years.length > 0) ySel.onchange();
      } catch (e) {
        log("Failed to load archives.");
      }
    }

    document.getElementById('btnLoad').onclick = async () => {
      const u = document.getElementById('player').value;
      const y = document.getElementById('year').value;
      const m = document.getElementById('month').value;
      log(`Loading ${y}/${m}...`);
      const res = await fetch(`https://api.chess.com/pub/player/${u}/games/${y}/${m}`);
      const data = await res.json();
      const gList = document.getElementById('gameList');
      gList.innerHTML = "";
      data.games.forEach((g, i) => {
        const opt = new Option(`${new Date(g.end_time * 1000).toLocaleDateString()} vs ${g.white.username === u ? g.black.username : g.white.username}`, i);
        opt.dataset.pgn = g.pgn;
        gList.add(opt);
      });
    };

    /**
     * Main analysis logic: stop at first significant eval change.
     */
    document.getElementById('btnAnalyze').onclick = async () => {
      const sel = document.getElementById('gameList').selectedOptions[0];
      if (!sel) return alert("Select a game!");

      const user = document.getElementById('player').value.toLowerCase();
      const margin = parseInt(document.getElementById('margin').value);
      const chess = new Chess();
      chess.load_pgn(sel.dataset.pgn);
      const history = chess.history({ verbose: true });

      chess.reset();
      let last_eval = 0;
      log("Analyzing move by move...");

      for (let i = 0; i < history.length; i++) {
        const move = history[i];
        const fen_before = chess.fen();
        const side = chess.turn(); // 'w' or 'b'

        const current_eval = await evaluate(fen_before, 12);
        console.log(current_eval);

        // Difference from the previous position's expected outcome
        const diff = Math.abs(current_eval - last_eval);

        if (diff >= margin) {
          log(`Found blindspot at move ${i + 1}!`);
          const puzzle = {
            fen: fen_before,
            gain: (diff / 100).toFixed(1),
            side: side === 'w' ? 'White' : 'Black',
            solution: move.san,
            id: Date.now()
          };
          save_puzzle(puzzle);
          show_puzzle(puzzle);
          return; // Stop at first occurrence
        }

        chess.move(move);
        last_eval = current_eval;
      }
      log("No blindspots found in this game with current margin.");
    };

    function save_puzzle(p) {
      const existing = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      existing.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(existing));
      render_saved_puzzles();
    }

    function render_saved_puzzles() {
      const container = document.getElementById('puzzles');
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      container.innerHTML = "<h3>Saved Puzzles</h3>";
      items.forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        div.innerHTML = `<span>${p.side} to gain ${p.gain}</span>`;
        const btn = document.createElement('button');
        btn.textContent = "Load";
        btn.style.width = "auto";
        btn.onclick = () => show_puzzle(p);
        div.appendChild(btn);
        container.appendChild(div);
      });
    }

    function show_puzzle(p) {
      state_.current_puzzle = p;
      state_.board.position(p.fen);
      document.getElementById('hint').innerHTML = `<strong>Hint:</strong> Find ${p.side} move to gain ${p.gain}`;
      document.getElementById('btnSolution').style.display = 'block';
    }

    document.getElementById('btnSolution').onclick = () => {
      alert(`The move was: ${state_.current_puzzle.solution}`);
    };

    window.onload = init;
  </script>
</body>

</html>
