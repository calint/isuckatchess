<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="lib/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 1200px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      height: fit-content;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
    }

    button:disabled {
      background: #ccc;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      height: 300px;
      overflow-y: auto;
      background: #222;
      color: #00ff00;
      padding: 0.8rem;
      border-radius: 4px;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre;
    }

    .puzzle-item {
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-container {
      display: flex;
      gap: 15px;
      align-items: stretch;
      margin: 1rem 0;
    }

    #eval-bar {
      width: 30px;
      background: #444;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    #eval-fill {
      width: 100%;
      height: 50%;
      background: #eee;
      position: absolute;
      bottom: 0;
      transition: height 0.3s ease;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Blindspot Trainer</h1>
  </header>
  <main>
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <section class="panel">
        <div style="display:flex; gap:0.5rem">
          <input id="player" type="text" value="calint" placeholder="Username" style="flex:2">
          <button id="btnReload" style="flex:0.5; background: #607d8b; padding: 0;">↻</button>
          <select id="year" style="flex:1"></select>
          <select id="month" style="flex:1"></select>
        </div>
        <button id="btnLoad">Fetch Games</button>
        <select id="gameList" size="6" style="margin-bottom:1rem"></select>
        <div class="settings-row">
          <div style="flex: 2;"><label style="font-size: 0.8rem; font-weight: 700;">Lookahead:</label>
            <select id="lookahead">
              <option value="2">2 moves</option>
              <option value="3">3 moves</option>
              <option value="4">4 moves</option>
              <option value="5">5 moves</option>
              <option value="8">8 moves</option>
              <option value="10">10 moves</option>
              <option value="12" selected>12 moves</option>
            </select>
          </div>
          <div style="flex: 1;"><label style="font-size: 0.8rem; font-weight: 700;">Margin (CP):</label>
            <input id="margin" type="number" value="250">
          </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 1rem;">
          <button id="btnAnalyze" style="flex: 2; background: #2e7d32; margin: 0;">Analyze Selected</button>
          <button id="btnBatch" style="flex: 2; background: #1565c0; margin: 0;">Batch All</button>
          <button id="btnStop" style="flex: 1; background: #c62828; margin: 0; display: none;">Stop</button>
        </div>

        <div id="log">Ready.</div>
      </section>
    </div>

    <section class="panel">
      <div id="puzzle-header"
        style="background: #333; color: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.9rem; border-left: 4px solid #ffca28;">
        <div id="ph-players" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 4px;"></div>
        <div id="ph-meta" style="color: #aaa; font-size: 0.8rem; margin-bottom: 8px;"></div>
        <div id="ph-eval" style="color: #ffca28; font-weight: bold;"></div>
      </div>
      <div id="hint" style="background: #fff9c4; padding: 0.5rem; border-radius: 4px;">Select a puzzle to begin...</div>
      <div class="board-container">
        <div id="eval-bar">
          <div id="eval-fill"></div>
        </div>
        <div id="board"></div>
      </div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button id="btnPrev" style="flex:1">Step Back</button>
        <button id="btnNext" style="flex:1">Step Forward</button>
      </div>
      <button id="btnSolution" style="display:none; background:#0b4a6f;">Show Solution</button>
      <div id="solutionText"
        style="margin-top: 1rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; border: 1px solid #0b4a6f;">
      </div>
      <div id="puzzles" style="margin-top: 2rem;"></div>
    </section>
  </main>

  <script src="lib/jquery-3.6.0.min.js"></script>
  <script src="lib/chessboard-1.0.0.min.js"></script>
  <script src="lib/chess.min.js"></script>

  <script>
    const state_ = {
      engine: null,
      board: null,
      current_puzzle: null,
      training_game: new Chess(),
      isBatchRunning: false,
      analyzedGames: new Set()
    };

    function init() {
      state_.board = Chessboard('board', {
        position: 'start',
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png'
      });
      loadArchives();
      renderSavedPuzzles();
      setupEventListeners();
    }

    function setupEventListeners() {
      document.getElementById('btnReload').onclick = reloadUserArchives;
      document.getElementById('btnLoad').onclick = loadGamesForMonth;
      document.getElementById('btnAnalyze').onclick = () => runAnalysis(false);
      document.getElementById('btnBatch').onclick = runBatchAnalysis;
      document.getElementById('btnStop').onclick = () => { state_.isBatchRunning = false; };
      document.getElementById('btnSolution').onclick = playSolution;
      document.getElementById('btnPrev').onclick = stepBack;
      document.getElementById('btnNext').onclick = stepForward;
    }

    function reloadUserArchives() {
      document.getElementById('gameList').innerHTML = "";
      state_.analyzedGames.clear();
      loadArchives();
    }

    async function getEngine() {
      if (state_.engine) return state_.engine;
      log("Loading Local Stockfish...");
      state_.engine = new Worker("lib/stockfish.js");
      state_.engine.postMessage("uci");
      return state_.engine;
    }

    function log(msg, isHeader = false) {
      const el = document.getElementById('log');
      const div = document.createElement('div');
      if (isHeader) div.style.color = '#fff';
      div.textContent = `> ${msg}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function getMaterialScore(c) {
      const v = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
      return c.board().flat().reduce((acc, p) => p ? acc + (v[p.type] * (p.color === 'w' ? 1 : -1)) : acc, 0);
    }

    function updateEvalBar(cp) {
      const p = Math.max(0, Math.min(100, 50 + (cp / 20)));
      document.getElementById('eval-fill').style.height = p + "%";
    }

    async function updateEvalFromFen(f) {
      const a = await evaluate(f, 8);
      updateEvalBar(a.score);
    }

    async function loadArchives() {
      const user = document.getElementById('player').value.trim();
      if (!user) return;
      log(`Loading archives for ${user}...`);
      try {
        const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
        if (!res.ok) throw new Error("User not found");
        const data = await res.json();
        const archives = data.archives.map(url => {
          const p = url.split('/');
          return { year: p[p.length - 2], month: p[p.length - 1] };
        }).sort((a, b) => b.year - a.year || b.month - a.month);

        const years = [...new Set(archives.map(a => a.year))];
        const ySel = document.getElementById('year');
        ySel.innerHTML = "";
        years.forEach(y => ySel.add(new Option(y, y)));

        ySel.onchange = () => {
          const mSel = document.getElementById('month');
          mSel.innerHTML = "";
          archives.filter(a => a.year === ySel.value).forEach(a => mSel.add(new Option(a.month, a.month)));
        };
        if (years.length > 0) ySel.onchange();
      } catch (e) { log(`Error: Could not find archives for "${user}".`); }
    }

    async function loadGamesForMonth() {
      const u = document.getElementById('player').value;
      const y = document.getElementById('year').value;
      const m = document.getElementById('month').value;
      log(`Fetching ${y}/${m}...`);

      const res = await fetch(`https://api.chess.com/pub/player/${u}/games/${y}/${m}`);
      const data = await res.json();
      const list = document.getElementById('gameList');
      list.innerHTML = "";

      const existingPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');

      data.games.reverse().forEach((g, i) => {
        // 1. Get the date from the Unix timestamp (end_time)
        const dateObj = new Date(g.end_time * 1000);
        const dateStr = dateObj.toLocaleDateString(); // e.g. "3/21/2026"

        const wR = g.white.rating || "?";
        const bR = g.black.rating || "?";

        // 2. Create a stable ID using players and the timestamp
        const gameId = btoa(`${g.white.username}-${g.black.username}-${g.end_time}`).substring(0, 16);
        const hasPuzzle = existingPuzzles.some(p => p.gameId === gameId);

        const opt = new Option(`${hasPuzzle ? '⭐ ' : ''}${dateStr}: ${g.white.username} vs ${g.black.username}`, i);
        opt.dataset.pgn = g.pgn;
        opt.dataset.gameId = gameId;
        opt.dataset.gameDate = dateStr; // Store the date here!
        list.add(opt);
      });
    }

    function calculateMaterialGap(side, fen, pv, plies) {
      const currentBoardMat = getMaterialScore(new Chess(fen));
      const sim = new Chess(fen);
      const moves = pv.split(" ");
      for (let j = 0; j < Math.min(plies, moves.length); ++j) {
        if (moves[j].length >= 4) sim.move({ from: moves[j].substring(0, 2), to: moves[j].substring(2, 4), promotion: moves[j][4] || 'q' });
      }
      return (side === 'w' ? 1 : -1) * (getMaterialScore(sim) - currentBoardMat);
    }

    async function evaluate(fen, depth) {
      const engine = await getEngine();
      const side = fen.split(" ")[1];

      // IMMEDIATE CHECK: If the game is already over, Stockfish won't reply with a 'bestmove'
      const check = new Chess(fen);
      if (check.game_over()) {
        const score = check.in_checkmate() ? (side === 'w' ? -9999 : 9999) : 0;
        return { score, best: "", san: "NONE", pv: "" };
      }

      return new Promise((resolve) => {
        let score = 0, pv = "", best = "";

        const onMsg = (e) => {
          if (e.data.startsWith("info depth") && e.data.includes("score cp")) {
            const cp = e.data.match(/score cp (-?\d+)/);
            if (cp) score = parseInt(cp[1]) * (side === 'b' ? -1 : 1);
            const p = e.data.match(/ pv (.+)/);
            if (p) pv = p[1];
          }
          // If the score is a mate score
          if (e.data.startsWith("info depth") && e.data.includes("score mate")) {
            const m = e.data.match(/score mate (-?\d+)/);
            if (m) score = (parseInt(m[1]) > 0 ? 9999 : -9999);
          }
          if (e.data.startsWith("bestmove")) {
            best = e.data.split(" ")[1];
            engine.removeEventListener("message", onMsg);
            resolve({ score, best, san: convertPvToAlgebraic(fen, best).split(" ")[0] || "??", pv });
          }
        };

        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    function convertPvToAlgebraic(fen, pv) {
      const temp = new Chess(fen);
      const san = [];
      if (!pv) return "";
      pv.split(" ").forEach(m => {
        const r = temp.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
        if (r) san.push(r.san);
      });
      return san.join(" ");
    }

    async function runBatchAnalysis() {
      const list = document.getElementById('gameList');
      if (list.options.length === 0) return alert("Fetch games first!");

      state_.isBatchRunning = true;
      document.getElementById('btnStop').style.display = 'block';
      document.getElementById('btnBatch').disabled = true;

      const startPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').length;

      for (let i = 0; i < list.options.length; i++) {
        // Essential check: did the user click Stop?
        if (!state_.isBatchRunning) {
          log("Batch analysis stopped by user.");
          break;
        }

        const option = list.options[i];

        // Skip games we've already looked at in THIS session
        if (state_.analyzedGames.has(option.dataset.pgn)) continue;

        // Auto-scroll the list to the current game
        list.selectedIndex = i;
        option.scrollIntoView({ block: 'nearest' });

        log(`Analyzing Game ${i + 1}/${list.options.length}...`, true);

        await runAnalysis(true);

        // Mark as processed so we don't hit it again if the user restarts the batch
        state_.analyzedGames.add(option.dataset.pgn);

        // Short breathing room for the browser
        await new Promise(r => setTimeout(r, 150));
      }

      const endPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').length;
      state_.isBatchRunning = false;
      document.getElementById('btnStop').style.display = 'none';
      document.getElementById('btnBatch').disabled = false;
      log(`Batch complete. Created ${endPuzzles - startPuzzles} new puzzles.`, true);
    }

    async function runAnalysis(isBatch = false) {
      const sel = document.getElementById('gameList').selectedOptions[0];
      if (!sel) return false;

      const gameId = sel.dataset.gameId;
      const gameDate = sel.dataset.gameDate; // Use the date we stored earlier

      const existingPuzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const found = existingPuzzles.find(p => p.gameId === gameId);

      if (found) {
        log(`Loading existing puzzle for this game...`, true);
        showPuzzle(found);
        return true;
      }

      // If no puzzle exists, proceed with analysis...
      if (!isBatch) document.getElementById('log').innerHTML = "";
      const user = document.getElementById('player').value.toLowerCase();
      const margin = parseInt(document.getElementById('margin').value);

      const game = new Chess();
      game.load_pgn(sel.dataset.pgn);
      const wP = game.header().White || "Unknown";
      const bP = game.header().Black || "Unknown";
      const uSide = (bP.toLowerCase() === user) ? 'black' : 'white';

      state_.board.orientation(uSide);

      const history = game.history({ verbose: true });
      game.reset();

      for (let i = 0; i < history.length; ++i) {
        await new Promise(r => setTimeout(r, 10));
        if (isBatch && !state_.isBatchRunning) return false;

        const move = history[i], fen = game.fen(), side = game.turn();

        // Safety: Check for game over before engine call
        if (new Chess(fen).game_over()) break;

        const analysis = await evaluate(fen, 10);
        const bestMoveSan = convertPvToAlgebraic(fen, analysis.best).split(" ")[0];

        game.move(move);
        state_.board.position(game.fen());

        if (game.game_over()) {
          log(`${(side === 'w' ? Math.floor(i / 2) + 1 + '.' : '...')} Played: ${move.san} (Game Over)`);
          break;
        }

        const post = await evaluate(game.fen(), 10);
        updateEvalBar(post.score);

        const moveNum = Math.floor(i / 2) + 1;
        const prefix = (side === 'w') ? `${moveNum}.` : `${moveNum}...`;
        log(`${prefix} Played: ${move.san} (${post.score}) | Engine: ${bestMoveSan} (${analysis.score})`);

        const gap = (side === 'w' ? 1 : -1) * (analysis.score - post.score);
        const isUserTurn = (side === 'w' && wP.toLowerCase() === user) || (side === 'b' && bP.toLowerCase() === user);

        const getGameDate = (game) => {
          const h = game.header();
          return h.Date || h.date || h.UTCDate || "Unknown Date";
        };

        if (isUserTurn && gap >= margin && (move.from + move.to) !== analysis.best.substring(0, 4)) {
          log(`   >> BLINDSPOT FOUND: ${gap} CP Drop`, true);

          const p = {
            gameId: gameId,
            fen,
            side: side === 'w' ? 'white' : 'black',
            gain: `evaluation change: ${gap} CP`,
            id: Date.now() + i,
            solved: false,
            solution: convertPvToAlgebraic(fen, analysis.pv),
            players: `${wP} vs ${bP}`,
            date: gameDate // No more "Unknown"!
          };

          savePuzzle(p);
          if (!isBatch) showPuzzle(p);
          return true;
        }
      }

      if (!isBatch) log("No blind spot found in this game.", true);
      return false;
    }

    function savePuzzle(p) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      items.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(items));
      renderSavedPuzzles();
    }

    function renderSavedPuzzles() {
      const container = document.getElementById('puzzles');
      let items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      items.sort((a, b) => a.solved - b.solved);
      container.innerHTML = "<h3>Saved Puzzles</h3>";
      items.forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        div.style.opacity = p.solved ? "0.6" : "1";
        div.style.display = "block";
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div style="flex: 1; padding-right: 10px;">
              <div><strong>${p.players || 'N/A'}</strong> ${p.solved ? '✅' : ''}</div>
              <div style="font-size: 0.75rem; color: #777;">${p.date || ''} | ${p.side} move — ${p.gain}</div>
            </div>
            <div style="display:flex; gap:4px;">
              <button onclick="loadPuzzleById(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px;">Load</button>
              ${!p.solved ? `<button onclick="markSolved(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px; background:#28a745">Solved</button>` : ''}
              <button onclick="deletePuzzle(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px; background:#dc3545">Delete</button>
            </div>
          </div>`;
        container.appendChild(div);
      });
    }

    function loadPuzzleById(id) {
      const p = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').find(x => x.id === id);
      if (p) showPuzzle(p);
    };

    function markSolved(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = items.find(x => x.id === id);
      if (p) { p.solved = true; localStorage.setItem('chess_puzzles', JSON.stringify(items)); renderSavedPuzzles(); }
    };

    function deletePuzzle(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').filter(p => p.id !== id);
      localStorage.setItem('chess_puzzles', JSON.stringify(items));
      renderSavedPuzzles();
    };

    async function showPuzzle(p) {
      state_.current_puzzle = p;
      state_.training_game.load(p.fen);

      // Extract the CP value (e.g., from "Eval Drop: 250CP")
      const cpMatch = p.gain.match(/\d+/);
      const cpValue = cpMatch ? cpMatch[0] : "???";

      const header = document.getElementById('puzzle-header');
      header.style.display = 'block';

      // Displaying the fixed metadata
      document.getElementById('ph-players').textContent = p.players;
      document.getElementById('ph-meta').textContent = `${p.date} | Side: ${p.side.toUpperCase()}`;
      document.getElementById('ph-eval').textContent = `Find moves to improve position by ${cpValue} CP`;

      document.getElementById('solutionText').style.display = 'none';
      const solutionMoves = p.solution.split(" ");

      state_.board = Chessboard('board', {
        draggable: true,
        position: p.fen,
        orientation: p.side,
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
        onDrop: (source, target) => {
          const currentIdx = state_.training_game.history().length;
          const tempGame = new Chess(state_.training_game.fen());

          // 1. Synchronous Check: Is the move legal and correct?
          const move = tempGame.move({ from: source, to: target, promotion: 'q' });
          if (move === null || move.san !== solutionMoves[currentIdx]) {
            document.getElementById('hint').innerHTML =
              `<span style="color: #d32f2f;"><strong>Not according to the engine.</strong> Try again!</span>`;
            return 'snapback';
          }

          // 2. Async logic: Handle the engine response separately
          (async () => {
            state_.training_game.move(move.san);
            document.getElementById('hint').innerHTML = `<span style="color: #2e7d32;"><strong>Correct!</strong></span>`;

            state_.board.position(state_.training_game.fen());
            const userEval = await evaluate(state_.training_game.fen(), 10);
            updateEvalBar(userEval.score);

            const nextIdx = state_.training_game.history().length;
            if (nextIdx < solutionMoves.length) {
              await new Promise(r => setTimeout(r, 600));
              state_.training_game.move(solutionMoves[nextIdx]);
              state_.board.position(state_.training_game.fen());

              const postReplyEval = await evaluate(state_.training_game.fen(), 10);
              updateEvalBar(postReplyEval.score);

              const hintEl = document.getElementById('hint');
              if (nextIdx + 1 < solutionMoves.length) {
                hintEl.innerHTML = `<strong>Your Turn:</strong> Keep going...`;
              } else {
                hintEl.innerHTML = `<span style="color: #2e7d32;"><strong>Puzzle Complete!</strong></span>`;
                markSolved(p.id);
              }
            }
          })();
        }
      });

      document.getElementById('btnSolution').style.display = 'block';
      document.getElementById('hint').innerHTML = `<strong>Your Turn:</strong> Find the best ${p.side} move.`;
    }

    async function playSolution() {
      if (!state_.current_puzzle) return;
      document.getElementById('solutionText').innerHTML = `<strong>Solution:</strong> ${state_.current_puzzle.solution}`;
      document.getElementById('solutionText').style.display = 'block';
      state_.training_game.load(state_.current_puzzle.fen);
      state_.board.position(state_.current_puzzle.fen);
      for (const m of state_.current_puzzle.solution.split(" ")) {
        if (!m) continue;
        await new Promise(r => setTimeout(r, 600));
        if (state_.training_game.move(m)) {
          state_.board.position(state_.training_game.fen());
          updateEvalFromFen(state_.training_game.fen());
        }
      }
    }

    function stepBack() {
      if (state_.training_game.undo()) {
        state_.board.position(state_.training_game.fen());
        updateEvalFromFen(state_.training_game.fen());
      }
    }

    async function stepForward() {
      if (!state_.current_puzzle) return;

      const sol = state_.current_puzzle.solution.split(" ");
      const history = state_.training_game.history();
      const currentIdx = history.length;

      // 1. Play the "Correct" move (the one the player missed)
      if (currentIdx < sol.length) {
        const move1 = state_.training_game.move(sol[currentIdx]);
        if (move1) {
          state_.board.position(state_.training_game.fen());
          updateEvalFromFen(state_.training_game.fen());

          // 2. Wait a beat, then play the Engine's best response
          await new Promise(r => setTimeout(r, 500));

          const nextIdx = currentIdx + 1;
          if (nextIdx < sol.length) {
            const move2 = state_.training_game.move(sol[nextIdx]);
            if (move2) {
              state_.board.position(state_.training_game.fen());
              updateEvalFromFen(state_.training_game.fen());
            }
          }
        }
      }
    }

    window.onload = init;
  </script>
