<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="lib/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 1200px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      height: fit-content;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
      transition: opacity 0.2s;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      height: 300px;
      overflow-y: auto;
      background: #222;
      color: #00ff00;
      padding: 0.8rem;
      border-radius: 4px;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre;
    }

    .puzzle-item {
      padding: 0.8rem;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }

    .puzzle-item:hover {
      background: #f9f9f9;
    }

    .board-container {
      display: flex;
      gap: 15px;
      align-items: stretch;
      margin: 1rem 0;
    }

    #eval-bar {
      width: 30px;
      background: #444;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    #eval-fill {
      width: 100%;
      height: 50%;
      background: #eee;
      position: absolute;
      bottom: 0;
      transition: height 0.3s ease;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }

    .badge {
      font-weight: bold;
      color: var(--primary);
      font-size: 0.7rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Blindspot Trainer</h1>
  </header>
  <main>
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <section class="panel">
        <div style="display:flex; gap:0.5rem">
          <input id="player" type="text" value="calint" style="flex:2">
          <button id="btnReload" style="flex:0.5; background: #607d8b;">↻</button>
          <select id="year" style="flex:1"></select>
          <select id="month" style="flex:1"></select>
        </div>
        <button id="btnLoad">Fetch Games</button>
        <select id="gameList" size="6"></select>
        <div class="settings-row">
          <div style="flex: 2;"><label style="font-size: 0.8rem; font-weight: 700;">Lookahead:</label>
            <select id="lookahead">
              <option value="5">5 moves</option>
              <option value="8">8 moves</option>
              <option value="12" selected>12 moves</option>
            </select>
          </div>
          <div style="flex: 1;"><label style="font-size: 0.8rem; font-weight: 700;">Margin (CP):</label>
            <input id="margin" type="number" value="250">
          </div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button id="btnAnalyze" style="flex: 2; background: #2e7d32;">Analyze Selected</button>
          <button id="btnBatch" style="flex: 2; background: #1565c0;">Batch All</button>
          <button id="btnStop" style="flex: 1; background: #c62828; display: none;">Stop</button>
        </div>
        <div id="log">Ready.</div>
      </section>
    </div>

    <section class="panel">
      <div id="puzzle-header"
        style="background: #333; color: #fff; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; border-left: 4px solid #ffca28;">
        <div id="ph-players" style="font-weight: bold; font-size: 1.1rem;"></div>
        <div id="ph-meta" style="color: #aaa; font-size: 0.8rem;"></div>
        <div id="ph-eval" style="color: #ffca28; font-weight: bold;"></div>
      </div>
      <div id="hint" style="background: #fff9c4; padding: 0.5rem; border-radius: 4px;">Select a puzzle...</div>
      <div class="board-container">
        <div id="eval-bar">
          <div id="eval-fill"></div>
        </div>
        <div id="board"></div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="btnPrev" style="flex:1">Step Back</button>
        <button id="btn-hint" class="btn">Get Hint</button>
        <button id="btnNext" style="flex:1">Step Forward</button>
      </div>
      <button id="btnSolution" style="display:none; margin-top: 10px;">Show Solution</button>
      <div id="solutionText"
        style="margin-top: 1rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; border: 1px solid #0b4a6f;">
      </div>
      <div id="puzzles" style="margin-top: 2rem;"></div>
    </section>
  </main>

  <script src="lib/jquery-3.6.0.min.js"></script>
  <script src="lib/chessboard-1.0.0.min.js"></script>
  <script src="lib/chess.min.js"></script>

  <script>
    // UI Cache to avoid repeated DOM lookups
    const UI = {
      player: document.getElementById('player'),
      year: document.getElementById('year'),
      month: document.getElementById('month'),
      gameList: document.getElementById('gameList'),
      log: document.getElementById('log'),
      hint: document.getElementById('hint'),
      evalFill: document.getElementById('eval-fill'),
      puzzleHeader: document.getElementById('puzzle-header'),
      phPlayers: document.getElementById('ph-players'),
      phMeta: document.getElementById('ph-meta'),
      phEval: document.getElementById('ph-eval'),
      puzzles: document.getElementById('puzzles'),
      solutionText: document.getElementById('solutionText'),
      btnStop: document.getElementById('btnStop'),
      btnBatch: document.getElementById('btnBatch'),
      btnSolution: document.getElementById('btnSolution'),
      lookahead: document.getElementById('lookahead'),
      margin: document.getElementById('margin')
    };

    const state_ = {
      engine: null,
      board: null,
      current_puzzle: null,
      training_game: new Chess(),
      isBatchRunning: false,
      analyzedGames: new Set()
    };

    function init() {
      state_.board = Chessboard('board', { position: 'start', pieceTheme: 'img/chesspieces/wikipedia/{piece}.png' });
      document.getElementById('btn-hint').addEventListener('click', showPieceHint);
      loadArchives();
      renderSavedPuzzles();
      setupEventListeners();
    }

    function setupEventListeners() {
      document.getElementById('btnReload').onclick = () => { UI.gameList.innerHTML = ""; state_.analyzedGames.clear(); loadArchives(); };
      document.getElementById('btnLoad').onclick = loadGamesForMonth;
      document.getElementById('btnAnalyze').onclick = () => runAnalysis(false);
      document.getElementById('btnBatch').onclick = runBatchAnalysis;
      UI.btnStop.onclick = () => { state_.isBatchRunning = false; };
      UI.btnSolution.onclick = playSolution;
      document.getElementById('btnPrev').onclick = stepBack;
      document.getElementById('btnNext').onclick = stepForward;
    }

    async function getEngine() {
      if (state_.engine) return state_.engine;
      log("Loading Local Stockfish...");
      state_.engine = new Worker("lib/stockfish.js");
      state_.engine.postMessage("uci");
      return state_.engine;
    }

    function log(msg, isHeader = false) {
      const div = document.createElement('div');
      if (isHeader) div.style.color = '#fff';
      div.textContent = `> ${msg}`;
      UI.log.appendChild(div);
      UI.log.scrollTop = UI.log.scrollHeight;
    }

    function updateEvalBar(cp) {
      const p = Math.max(0, Math.min(100, 50 + (cp / 20)));
      UI.evalFill.style.height = p + "%";
    }

    async function loadArchives() {
      const user = UI.player.value.trim();
      if (!user) return;
      try {
        const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
        const data = await res.json();
        const archives = data.archives.map(url => {
          const p = url.split('/');
          return { year: p[p.length - 2], month: p[p.length - 1] };
        }).sort((a, b) => b.year - a.year || b.month - a.month);

        UI.year.innerHTML = "";
        [...new Set(archives.map(a => a.year))].forEach(y => UI.year.add(new Option(y, y)));
        UI.year.onchange = () => {
          UI.month.innerHTML = "";
          archives.filter(a => a.year === UI.year.value).forEach(a => UI.month.add(new Option(a.month, a.month)));
        };
        UI.year.onchange();
      } catch (e) { log("Error: User not found."); }
    }

    async function loadGamesForMonth() {
      const res = await fetch(`https://api.chess.com/pub/player/${UI.player.value}/games/${UI.year.value}/${UI.month.value}`);
      const data = await res.json();
      UI.gameList.innerHTML = "";
      const puzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');

      data.games.reverse().forEach((g, i) => {
        const gameId = btoa(`${g.white.username}-${g.black.username}-${g.end_time}`).substring(0, 16);
        const record = puzzles.find(p => p.gameId === gameId);
        let prefix = record ? (record.isClean ? "✔ " : "⭐ ") : "";
        const opt = new Option(`${prefix}${new Date(g.end_time * 1000).toLocaleDateString()}: ${g.white.username} vs ${g.black.username}`, i);
        Object.assign(opt.dataset, { pgn: g.pgn, gameId: gameId, gameDate: new Date(g.end_time * 1000).toLocaleDateString() });
        UI.gameList.add(opt);
      });
    }

    async function evaluate(fen, depth) {
      const engine = await getEngine();
      const side = fen.split(" ")[1];
      const check = new Chess(fen);
      if (check.game_over()) return { score: check.in_checkmate() ? (side === 'w' ? -9999 : 9999) : 0, best: "" };

      return new Promise(resolve => {
        let score = 0, best = "", pv = "";
        const onMsg = (e) => {
          if (e.data.startsWith("info depth") && e.data.includes("score cp")) {
            const cp = e.data.match(/score cp (-?\d+)/);
            if (cp) score = parseInt(cp[1]) * (side === 'b' ? -1 : 1);
            const p = e.data.match(/ pv (.+)/);
            if (p) pv = p[1];
          }
          if (e.data.startsWith("bestmove")) {
            best = e.data.split(" ")[1];
            engine.removeEventListener("message", onMsg);
            resolve({ score, best, pv });
          }
        };
        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    function convertPvToAlgebraic(fen, pv) {
      const temp = new Chess(fen);
      const san = [];
      if (!pv) return "";
      pv.split(" ").forEach(m => {
        const r = temp.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
        if (r) san.push(r.san);
      });
      return san.join(" ");
    }

    async function runAnalysis(isBatch = false) {
      const sel = UI.gameList.selectedOptions[0];
      if (!sel) return false;

      const { gameId, gameDate, pgn } = sel.dataset;
      const game = new Chess();
      game.load_pgn(pgn);
      const wP = game.header().White || "Unknown";
      const bP = game.header().Black || "Unknown";

      UI.hint.style.display = 'none';
      UI.puzzleHeader.style.display = 'block';
      UI.phPlayers.textContent = `${wP} vs ${bP}`;
      UI.phMeta.textContent = `Analyzing: ${gameDate}`;
      UI.phEval.textContent = "Scanning for blindspots...";

      const depth = parseInt(UI.lookahead.value);
      const margin = parseInt(UI.margin.value);
      const puzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const found = puzzles.find(p => p.gameId === gameId);

      if (found && found.depth === depth && found.margin === margin) {
        if (found.isClean) { log("Skipping: Already verified clean."); return true; }
        showPuzzle(found); return true;
      }

      if (!isBatch) UI.log.innerHTML = "";
      const user = UI.player.value.toLowerCase();
      game.load_pgn(pgn);
      const uSide = bP.toLowerCase() === user ? 'black' : 'white';

      state_.board.orientation(uSide);
      const history = game.history({ verbose: true });
      game.reset();

      for (let i = 0; i < history.length; i++) {
        if (isBatch && !state_.isBatchRunning) return false;
        const move = history[i], fen = game.fen(), side = game.turn();
        const analysis = await evaluate(fen, depth);

        game.move(move);
        state_.board.position(game.fen());
        const post = await evaluate(game.fen(), depth);
        updateEvalBar(post.score);

        const gap = (side === 'w' ? 1 : -1) * (analysis.score - post.score);
        if (uSide.startsWith(side) && gap >= margin && (move.from + move.to) !== analysis.best.substring(0, 4)) {
          log(`>> BLINDSPOT: ${gap} CP Drop`, true);
          const p = { gameId, fen, side: side === 'w' ? 'white' : 'black', gain: `${gap} CP`, id: Date.now() + i, solution: convertPvToAlgebraic(fen, analysis.pv), players: `${wP} vs ${bP}`, date: gameDate, depth, margin, isClean: false };
          savePuzzle(p);
          if (!isBatch) showPuzzle(p);
          return true;
        }
      }
      savePuzzle({ gameId, isClean: true, depth, margin, players: `${wP} vs ${bP}`, date: gameDate, id: Date.now() });
      if (!isBatch) log("No blind spot found.");
      return false;
    }

    async function runBatchAnalysis() {
      state_.isBatchRunning = true;
      UI.btnStop.style.display = 'block';
      UI.btnBatch.disabled = true;
      for (let i = 0; i < UI.gameList.options.length; i++) {
        if (!state_.isBatchRunning) break;
        UI.gameList.selectedIndex = i;
        await runAnalysis(true);
      }
      state_.isBatchRunning = false;
      UI.btnStop.style.display = 'none';
      UI.btnBatch.disabled = false;
      renderSavedPuzzles();
    }

    function savePuzzle(p) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').filter(x => x.gameId !== p.gameId);
      items.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(items));
      renderSavedPuzzles();
    }

    function renderSavedPuzzles() {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').filter(p => !p.isClean);
      UI.puzzles.innerHTML = "<h3>Saved Puzzles</h3>";
      items.sort((a, b) => a.solved - b.solved).forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        div.style.opacity = p.solved ? "0.6" : "1";
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between;">
            <div><strong>${p.players}</strong> ${p.solved ? '✅' : ''}<br><span class="badge">[D:${p.depth} M:${p.margin}]</span> ${p.gain}</div>
            <div>
              <button onclick="loadPuzzleById(${p.id})" style="width:auto; padding: 4px 8px;">Load</button>
              <button onclick="deletePuzzle(${p.id})" style="width:auto; padding: 4px 8px; background:#dc3545">Del</button>
            </div>
          </div>`;
        UI.puzzles.appendChild(div);
      });
    }

    function loadPuzzleById(id) {
      const p = JSON.parse(localStorage.getItem('chess_puzzles') || '[]').find(x => x.id === id);
      if (p) showPuzzle(p);
    }

    function deletePuzzle(id) {
      localStorage.setItem('chess_puzzles', JSON.stringify(JSON.parse(localStorage.getItem('chess_puzzles') || '[]').filter(p => p.id !== id)));
      renderSavedPuzzles();
    }

    function markSolved(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = items.find(x => x.id === id);
      if (p && !p.solved) {
        p.solved = true;
        localStorage.setItem('chess_puzzles', JSON.stringify(items));
        renderSavedPuzzles();
        log(`Done: ${p.players}`, true);
      }
    }

    function showPieceHint() {
      const p = state_.current_puzzle;
      if (!p) return;

      const sol = p.solution.split(" ");
      const currentIdx = state_.training_game.history().length;

      // If the puzzle is already finished, don't show a move hint
      if (currentIdx >= sol.length) {
        UI.hint.innerHTML = "<strong>Puzzle Complete!</strong>";
        return;
      }

      // Use a temporary game to get the verbose move data for the NEXT move
      const tempGame = new Chess(state_.training_game.fen());
      const nextMoveSan = sol[currentIdx];
      const moveObj = tempGame.move(nextMoveSan);

      if (moveObj) {
        const pieceNames = {
          'p': 'Pawn', 'n': 'Knight', 'b': 'Bishop',
          'r': 'Rook', 'q': 'Queen', 'k': 'King'
        };

        const name = pieceNames[moveObj.color === 'w' ? moveObj.piece : moveObj.piece.toLowerCase()];
        const from = moveObj.from;

        UI.hint.style.display = 'block';
        UI.hint.innerHTML = `<strong>Hint:</strong> Move the <u>${name}</u> on <strong>${from}</strong>.`;
      }
    }

    async function showPuzzle(p) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      state_.current_puzzle = p;
      state_.training_game.load(p.fen);
      UI.puzzleHeader.style.display = 'block';
      UI.phPlayers.textContent = p.players;
      UI.phMeta.textContent = `${p.date} | Side: ${p.side.toUpperCase()}`;
      UI.phEval.textContent = `Improve position by ${p.gain}`;
      UI.solutionText.style.display = 'none';
      UI.btnSolution.style.display = 'block';
      UI.hint.style.display = 'block';
      UI.hint.innerHTML = `<strong>Your Turn:</strong> Find the best ${p.side} move.`;

      const sol = p.solution.split(" ");
      state_.board = Chessboard('board', {
        draggable: true, position: p.fen, orientation: p.side, pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
        onDrop: (s, t) => {
          const move = new Chess(state_.training_game.fen()).move({ from: s, to: t, promotion: 'q' });
          if (!move || move.san !== sol[state_.training_game.history().length]) return 'snapback';

          state_.training_game.move(move.san);
          state_.board.position(state_.training_game.fen());

          if (state_.training_game.history().length < sol.length) {
            setTimeout(() => {
              state_.training_game.move(sol[state_.training_game.history().length]);
              state_.board.position(state_.training_game.fen());
              UI.hint.innerHTML = "<strong>Your Turn:</strong> Keep going...";
            }, 600);
          } else {
            UI.hint.innerHTML = "<span style='color:green'>Correct!</span>";
            markSolved(p.id);
          }
        }
      });
    }

    async function playSolution() {
      if (!state_.current_puzzle) return;
      UI.solutionText.innerHTML = `<strong>Solution:</strong> ${state_.current_puzzle.solution}`;
      UI.solutionText.style.display = 'block';
      state_.training_game.load(state_.current_puzzle.fen);
      for (const m of state_.current_puzzle.solution.split(" ")) {
        await new Promise(r => setTimeout(r, 600));
        state_.training_game.move(m);
        state_.board.position(state_.training_game.fen());
      }
    }

    function stepBack() { if (state_.training_game.undo()) state_.board.position(state_.training_game.fen()); }

    async function stepForward() {
      const p = state_.current_puzzle;
      if (!p) return;

      const sol = p.solution.split(" ");
      const currentIdx = state_.training_game.history().length;

      // 1. Play the "Correct" move (the one the player missed or the next in sequence)
      if (currentIdx < sol.length) {
        const move1 = state_.training_game.move(sol[currentIdx]);
        if (move1) {
          state_.board.position(state_.training_game.fen());
          updateEvalFromFen(state_.training_game.fen());

          // 2. Wait a beat, then play the Engine's response automatically
          const nextIdx = currentIdx + 1;
          if (nextIdx < sol.length) {
            await new Promise(r => setTimeout(r, 400));
            const move2 = state_.training_game.move(sol[nextIdx]);
            if (move2) {
              state_.board.position(state_.training_game.fen());
              updateEvalFromFen(state_.training_game.fen());
            }
          }
        }
      }

      // Check if that completed the puzzle
      if (state_.training_game.history().length >= sol.length) {
        UI.hint.innerHTML = "<span style='color:green'>Puzzle Complete!</span>";
        markSolved(p.id);
      }
    }

    window.onload = init;
  </script>
</body>

</html>
