<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="lib/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 1200px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      height: fit-content;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
    }

    button:disabled {
      background: #ccc;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      height: 300px;
      overflow-y: auto;
      background: #222;
      color: #00ff00;
      padding: 0.8rem;
      border-radius: 4px;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre;
    }

    .puzzle-item {
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-container {
      display: flex;
      gap: 15px;
      align-items: stretch;
      margin: 1rem 0;
    }

    #eval-bar {
      width: 30px;
      background: #444;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    #eval-fill {
      width: 100%;
      height: 50%;
      background: #eee;
      position: absolute;
      bottom: 0;
      transition: height 0.3s ease;
    }

    .settings-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Blindspot Trainer</h1>
  </header>
  <main>
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <section class="panel">
        <div style="display:flex; gap:0.5rem">
          <input id="player" type="text" value="calint" placeholder="Username" style="flex:2">
          <button id="btnReload" style="flex:0.5; background: #607d8b; padding: 0;">↻</button>
          <select id="year" style="flex:1"></select>
          <select id="month" style="flex:1"></select>
        </div>
        <button id="btnLoad">Fetch Games</button>
        <select id="gameList" size="6" style="margin-bottom:1rem"></select>
        <div class="settings-row">
          <div style="flex: 2;"><label style="font-size: 0.8rem; font-weight: 700;">Lookahead:</label>
            <select id="lookahead">
              <option value="2">2 moves</option>
              <option value="3">3 moves</option>
              <option value="4" selected>4 moves</option>
              <option value="5">5 moves</option>
              <option value="8">8 moves</option>
            </select>
          </div>
          <div style="flex: 1;"><label style="font-size: 0.8rem; font-weight: 700;">Margin (CP):</label>
            <input id="margin" type="number" value="100">
          </div>
        </div>
        <label
          style="display: flex; align-items: center; gap: 8px; cursor: pointer; background: #eef7ff; padding: 8px; border-radius: 6px;">
          <input id="materialOnly" type="checkbox" style="width: auto; margin: 0;" checked>
          <span style="font-size: 0.85rem; font-weight: 600;">Focus on Material Gains only</span>
        </label>
        <button id="btnAnalyze" style="margin-top: 1rem; background: #2e7d32;">Start Analysis</button>
        <div id="log">Ready.</div>
      </section>
    </div>

    <section class="panel">
      <div id="hint" style="background: #fff9c4; padding: 0.5rem; border-radius: 4px;">Select a puzzle to begin...</div>
      <div class="board-container">
        <div id="eval-bar">
          <div id="eval-fill"></div>
        </div>
        <div id="board"></div>
      </div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button id="btnPrev" style="flex:1">Step Back</button>
        <button id="btnNext" style="flex:1">Step Forward</button>
      </div>
      <button id="btnSolution" style="display:none; background:#0b4a6f;">Show Solution</button>
      <div id="solutionText"
        style="margin-top: 1rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; border: 1px solid #0b4a6f;">
      </div>
      <div id="puzzles" style="margin-top: 2rem;"></div>
    </section>
  </main>

  <script src="lib/jquery-3.6.0.min.js"></script>
  <script src="lib/chessboard-1.0.0.min.js"></script>
  <script src="lib/chess.min.js"></script>

  <script>
    const state_ = { engine: null, board: null, current_puzzle: null, training_game: new Chess() };

    function init() {
      state_.board = Chessboard('board', {
        position: 'start',
        // Points to your local images
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png'
      });
      load_archives();
      render_saved_puzzles();
    }

    async function get_engine() {
      if (state_.engine) return state_.engine;
      log("Loading Local Stockfish...");

      // Points to your local stockfish.js file
      state_.engine = new Worker("lib/stockfish.js");

      state_.engine.postMessage("uci");
      return state_.engine;
    }

    function log(msg, isHeader = false) {
      const el = document.getElementById('log');
      const div = document.createElement('div');
      if (isHeader) div.style.color = '#fff';
      div.textContent = `> ${msg}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function delete_puzzle(id) {
      let items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      items = items.filter(p => p.id !== id);
      localStorage.setItem('chess_puzzles', JSON.stringify(items));
      render_saved_puzzles();
    }

    function mark_solved(id) {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = items.find(x => x.id === id);
      if (p) { p.solved = true; localStorage.setItem('chess_puzzles', JSON.stringify(items)); render_saved_puzzles(); }
    }

    // Add this to your script, preferably inside the init() or with other listeners
    document.getElementById('btnReload').onclick = () => {
      const user = document.getElementById('player').value.trim();
      if (!user) return;

      // Clear existing data to avoid confusion
      document.getElementById('year').innerHTML = "";
      document.getElementById('month').innerHTML = "";
      document.getElementById('gameList').innerHTML = "";
      log(`Reloading archives for user: ${user}...`);

      load_archives();
    };

    // Slightly updated load_archives to handle errors better
    async function load_archives() {
      const user = document.getElementById('player').value.trim();
      try {
        const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
        if (!res.ok) throw new Error("User not found");

        const data = await res.json();
        const archives = data.archives.map(url => {
          const p = url.split('/');
          return { year: p[p.length - 2], month: p[p.length - 1] };
        }).sort((a, b) => b.year - a.year || b.month - a.month);

        const years = [...new Set(archives.map(a => a.year))];
        const ySel = document.getElementById('year');
        ySel.innerHTML = "";

        years.forEach(y => ySel.add(new Option(y, y)));

        ySel.onchange = () => {
          const mSel = document.getElementById('month');
          mSel.innerHTML = "";
          archives
            .filter(a => a.year === ySel.value)
            .forEach(a => mSel.add(new Option(a.month, a.month)));
        };

        if (years.length > 0) {
          ySel.onchange();
          log(`Archives loaded for ${user}.`);
        } else {
          log(`No game history found for ${user}.`);
        }
      } catch (e) {
        log(`Error: Could not find archives for "${user}".`);
      }
    }

    document.getElementById('btnLoad').onclick = async () => {
      const u = document.getElementById('player').value;
      const y = document.getElementById('year').value;
      const m = document.getElementById('month').value;

      log(`Fetching ${y}/${m}...`);
      const res = await fetch(`https://api.chess.com/pub/player/${u}/games/${y}/${m}`);
      const data = await res.json();
      const list = document.getElementById('gameList');
      list.innerHTML = "";

      // Reverse the array so the most recent game is at the top of the list
      const games = data.games.reverse();

      games.forEach((g, i) => {
        const dateStr = new Date(g.end_time * 1000).toLocaleDateString();

        // Extract ratings from the API response objects
        const wRating = g.white.rating || "?";
        const bRating = g.black.rating || "?";

        const label = `${dateStr}: ${g.white.username} (${wRating}) vs ${g.black.username} (${bRating})`;

        const opt = new Option(label, i);
        opt.dataset.pgn = g.pgn;
        list.add(opt);
      });
    };

    function convertPvToAlgebraic(fen, pv) {
      const temp = new Chess(fen);
      const san = [];
      if (!pv) return "";
      pv.split(" ").forEach(m => {
        const r = temp.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
        if (r) san.push(r.san);
      });
      return san.join(" ");
    }

    function evaluate(fen, depth) {
      return new Promise(async (resolve) => {
        const engine = await get_engine();
        const side = fen.split(" ")[1];
        let score = 0, pv = "", best = "";

        const onMsg = (e) => {
          if (e.data.startsWith("info depth") && e.data.includes("score cp")) {
            const cp = e.data.match(/score cp (-?\d+)/);
            if (cp) score = parseInt(cp[1]) * (side === 'b' ? -1 : 1);
            const p = e.data.match(/ pv (.+)/);
            if (p) pv = p[1];
          }
          if (e.data.startsWith("bestmove")) {
            best = e.data.split(" ")[1];
            engine.removeEventListener("message", onMsg);
            resolve({ score, best, san: convertPvToAlgebraic(fen, best).split(" ")[0] || "??", pv });
          }
        };
        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    function update_eval_bar(cp) {
      const p = Math.max(0, Math.min(100, 50 + (cp / 20)));
      document.getElementById('eval-fill').style.height = p + "%";
    }

    function get_material_score(c) {
      const v = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
      return c.board().flat().reduce((acc, p) => p ? acc + (v[p.type] * (p.color === 'w' ? 1 : -1)) : acc, 0);
    }

    function save_puzzle(p) {
      const existing = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      existing.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(existing));
      render_saved_puzzles();
    }

    document.getElementById('btnAnalyze').onclick = async () => {
      const sel = document.getElementById('gameList').selectedOptions[0];
      if (!sel) return alert("Select a game!");

      document.getElementById('log').innerHTML = "";
      const user = document.getElementById('player').value.toLowerCase();
      const margin = parseInt(document.getElementById('margin').value);
      const matMode = document.getElementById('materialOnly').checked;
      const plies = parseInt(document.getElementById('lookahead').value) * 2;

      const game = new Chess();
      game.load_pgn(sel.dataset.pgn);

      // Extract Metadata including Ratings
      const whitePlayer = game.header().White || "Unknown";
      const whiteRating = game.header().WhiteElo || "?";
      const blackPlayer = game.header().Black || "Unknown";
      const blackRating = game.header().BlackElo || "?";
      const gameDate = game.header().Date || "Unknown";

      // 1. Determine orientation: If user is Black, flip board; otherwise White
      const userSide = (blackPlayer === user) ? 'black' : 'white';
      state_.board.orientation(userSide);
      log(`Orientation set to ${userSide} (User: ${user})`);

      const history = game.history({ verbose: true });
      game.reset();

      log(`RUNNING ANALYSIS...`, true);
      log(`----------------------------------------------`);

      for (let i = 0; i < history.length; i++) {
        const move = history[i];
        const fen = game.fen();
        const side = game.turn();

        const analysis = await evaluate(fen, 10);
        let targetMat = 0;
        if (matMode) {
          const sim = new Chess(fen);
          analysis.pv.split(" ").slice(0, plies).forEach(m => {
            if (m.length >= 4) sim.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: 'q' });
          });
          targetMat = get_material_score(sim);
        }

        const moveNum = Math.floor(i / 2) + 1;
        const prefix = (side === 'w' ? `${moveNum}.` : `...`).padEnd(4);
        log(`${prefix} Played: ${move.san.padEnd(6)} | Best: ${analysis.san.padEnd(6)}`);

        game.move(move);
        state_.board.position(game.fen());
        await new Promise(r => setTimeout(r, 50));

        const post = await evaluate(game.fen(), 10);
        update_eval_bar(post.score);

        // 4. Blindspot Logic
        let flag = false;
        let label = "";

        if (matMode) {
          // 1. Current material on board right now
          const currentBoardMat = get_material_score(game);

          // 2. What the engine achieves after plies
          const engineSim = new Chess(fen);
          const pvMoves = analysis.pv.split(" ");
          // Only simulate up to the requested plies
          for (let j = 0; j < Math.min(plies, pvMoves.length); ++j) {
            const m = pvMoves[j];
            if (m.length >= 4) engineSim.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
          }
          const targetMat = get_material_score(engineSim);

          // 3. Difference between Engine Future and Current Board
          const engineGain = (side === 'w' ? 1 : -1) * (targetMat - currentBoardMat);

          // 4. Check what the player actually achieved in the NEXT move (immediate drop)
          // We use 'post' evaluation which we already have from the move just played
          const immediateGameMat = get_material_score(game);
          const gameGain = (side === 'w' ? 1 : -1) * (immediateGameMat - currentBoardMat);

          // FLAG ONLY IF: 
          // Engine gains material (>= 1) AND Engine does better than what you played
          flag = (engineGain >= 1) && (engineGain > gameGain);
          label = `Missed +${engineGain} Material`;
        }

        const isUserTurn = (side === 'w' && whitePlayer === user) || (side === 'b' && blackPlayer === user);
        const playedBestMove = (move.from + move.to) === analysis.best.substring(0, 4);

        if (isUserTurn && flag && !playedBestMove) {
          log(`   >> BLINDSPOT: ${label}`, true);
          const newPuzzle = {
            fen: fen,
            gain: label,
            side: side === 'w' ? 'white' : 'black',
            solution: convertPvToAlgebraic(fen, analysis.pv),
            id: Date.now(),
            solved: false,
            // Updated players string to include ratings
            players: `${whitePlayer} (${whiteRating}) vs ${blackPlayer} (${blackRating})`,
            date: gameDate
          };
          save_puzzle(newPuzzle);
          show_puzzle(newPuzzle);
          return;
        }
      }
      log("----------------------------------------------");
      log("Analysis complete.");
      log("No blind spot found with current settings.", true);
    };

    function render_saved_puzzles() {
      const container = document.getElementById('puzzles');
      let items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      items.sort((a, b) => a.solved - b.solved);
      container.innerHTML = "<h3>Saved Puzzles</h3>";

      items.forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        div.style.opacity = p.solved ? "0.6" : "1";
        div.style.display = "block";

        // Use a smaller font for the player/rating line if it's long
        const heading = p.players ? `<span style="font-size: 0.9rem;"><strong>${p.players}</strong></span>` : `${p.side} (${p.gain})`;
        const dateText = p.date ? `<div style="font-size: 0.75rem; color: #777;">${p.date}</div>` : '';
        const subtext = p.players ? `<div style="font-size: 0.75rem; color: #555;">${p.side} to move — ${p.gain}</div>` : '';

        div.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div style="flex: 1; padding-right: 10px;">
          <div>${heading} ${p.solved ? '✅' : ''}</div>
          ${dateText}
          ${subtext}
        </div>
        <div style="display:flex; gap:4px;">
          <button onclick="load_puzzle_by_id(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px;">Load</button>
          ${!p.solved ? `<button onclick="mark_solved(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px; background:#28a745">Solved</button>` : ''}
          <button onclick="delete_puzzle(${p.id})" style="width:auto; padding: 4px 8px; font-size: 11px; background:#dc3545">Delete</button>
        </div>
      </div>`;
        container.appendChild(div);
      });
    }

    window.load_puzzle_by_id = (id) => {
      const puzzles = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const p = puzzles.find(x => x.id === id);
      if (p) show_puzzle(p);
    };

    function show_puzzle(p) {
      if (!p) return;
      state_.current_puzzle = p;
      state_.training_game.load(p.fen);
      state_.board = Chessboard('board', {
        draggable: true,
        position: p.fen,
        orientation: p.side,
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
        onDrop: (s, t) => {
          const move = state_.training_game.move({ from: s, to: t, promotion: 'q' });

          if (move) {
            // This line ensures the Rook snaps to the correct spot on castle
            // or that pieces disappear on capture.
            setTimeout(() => state_.board.position(state_.training_game.fen()), 250);
            update_eval_bar_from_fen(state_.training_game.fen());
          } else {
            return 'snapback';
          }
        }
      });
      document.getElementById('solutionText').style.display = 'none';
      document.getElementById('btnSolution').style.display = 'block';
      document.getElementById('hint').innerHTML = `<strong>Hint:</strong> Find ${p.side} move for ${p.gain}`;
    }

    document.getElementById('btnSolution').onclick = async () => {
      if (!state_.current_puzzle) return;

      // 1. Show the text for reference
      const st = document.getElementById('solutionText');
      st.innerHTML = `<strong>Solution:</strong> ${state_.current_puzzle.solution}`;
      st.style.display = 'block';

      // 2. Reset the board to the puzzle start
      state_.training_game.load(state_.current_puzzle.fen);
      state_.board.position(state_.current_puzzle.fen);

      // 3. Play through the solution moves with a delay
      const moves = state_.current_puzzle.solution.split(" ");
      for (const move of moves) {
        if (!move) continue;

        // Wait 600ms between moves so the user can follow
        await new Promise(resolve => setTimeout(resolve, 600));

        const result = state_.training_game.move(move);
        if (result) {
          state_.board.position(state_.training_game.fen());
          update_eval_bar_from_fen(state_.training_game.fen());
        }
      }
    };

    document.getElementById('btnPrev').onclick = () => {
      if (!state_.current_puzzle) return;

      const move = state_.training_game.undo();
      if (move) {
        state_.board.position(state_.training_game.fen());
        // update eval bar for the new position
        update_eval_bar_from_fen(state_.training_game.fen());
      }
    };

    document.getElementById('btnNext').onclick = () => {
      if (!state_.current_puzzle || !state_.current_puzzle.solution) return;

      const solutionMoves = state_.current_puzzle.solution.split(" ");
      const currentHistory = state_.training_game.history();
      const idx = currentHistory.length;

      if (idx < solutionMoves.length) {
        const move = state_.training_game.move(solutionMoves[idx]);
        if (move) {
          state_.board.position(state_.training_game.fen());
          // update eval bar for the new position
          update_eval_bar_from_fen(state_.training_game.fen());
        }
      }
    };

    async function update_eval_bar_from_fen(f) { const a = await evaluate(f, 8); update_eval_bar(a.score); }
    window.onload = init;
  </script>
</body>

</html>
