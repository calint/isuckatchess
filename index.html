<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chess Blindspot Trainer</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    :root {
      --primary: #0b4a6f;
      --bg: #f2f4f7;
    }

    body {
      font-family: system-ui;
      background: var(--bg);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 1rem;
      text-align: center;
    }

    main {
      max-width: 900px;
      width: 95%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }

    .panel {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    input,
    select,
    button {
      width: 100%;
      padding: 0.6rem;
      margin: 0.5rem 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 600;
      border: none;
    }

    #board {
      width: 100%;
      margin: 1rem 0;
    }

    #log {
      font-size: 0.8rem;
      height: 100px;
      overflow-y: auto;
      background: #eee;
      padding: 0.5rem;
      border-radius: 4px;
    }

    .puzzle-item {
      padding: 0.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Container for the board and the bar */
    .board-container {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin: 1rem 0;
    }

    /* The evaluation bar track */
    #eval-bar {
      width: 25px;
      background: #444;
      /* Black's color */
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    /* The white part of the bar */
    #eval-fill {
      width: 100%;
      height: 50%;
      /* Starts at middle (0.0) */
      background: #eee;
      /* White's color */
      position: absolute;
      bottom: 0;
      transition: height 0.3s ease;
    }
  </style>
</head>

<body>

  <header>
    <h1>Blindspot Trainer</h1>
  </header>

  <main>
    <section class="panel">
      <h2>1. Load Data</h2>
      <input id="player" type="text" value="calint" placeholder="Username">
      <div style="display:flex; gap:0.5rem">
        <select id="year"></select>
        <select id="month"></select>
      </div>
      <button id="btnLoad">Fetch Games</button>
      <select id="gameList" size="5"></select>
      <hr>
      <h2>2. Settings</h2>
      <label>Threshold (CP): <input id="margin" type="number" value="100"></label>
      <label style="display: flex; align-items: center; gap: 8px;">
        <input id="materialOnly" type="checkbox" style="width: auto;"> Focus on Material Gains only
      </label>
      <button id="btnAnalyze">Analyze & Find First Blindspot</button>
      <div id="log">Ready.</div>
    </section>

    <section class="panel">
      <h2>3. Training</h2>
      <div id="hint">Select a puzzle to begin...</div>
      <div class="board-container">
        <div id="eval-bar">
          <div id="eval-fill"></div>
        </div>
        <div id="board" style="flex-grow: 1;"></div>
      </div>
      <button id="btnSolution" style="display:none">Show Solution</button>
      <div id="solutionText"
        style="margin-top: 1rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; border: 1px solid #0b4a6f;">
      </div>
      <div id="puzzles"></div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <script>
    /**
     * Global application state.
     */
    const state_ = {
      engine: null,
      board: null,
      current_puzzle: null
    };

    /**
     * Initialize board and UI.
     */
    function init() {
      state_.board = Chessboard('board', {
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
      });
      load_archives();
      render_saved_puzzles();
    }

    /**
     * Log message to the UI.
     */
    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += `<div>> ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    /**
     * Fetch engine via Blob to avoid CORS file errors.
     */
    async function get_engine() {
      if (state_.engine) return state_.engine;
      log("Loading Stockfish...");
      const response = await fetch("https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js");
      const blob = new Blob([await response.text()], { type: 'application/javascript' });
      state_.engine = new Worker(URL.createObjectURL(blob));
      state_.engine.postMessage("uci");
      return state_.engine;
    }

    /**
      * Chess.com data fetching.
      */
    async function load_archives() {
      const user = document.getElementById('player').value;
      try {
        const res = await fetch(`https://api.chess.com/pub/player/${user}/games/archives`);
        const data = await res.json();

        // Extract year and month by splitting and taking the last two segments
        // Example URL: .../player/calint/games/2026/03
        const archiveData = data.archives.map(url => {
          const parts = url.split('/');
          return {
            url: url,
            year: parts[parts.length - 2],
            month: parts[parts.length - 1]
          };
        });

        const years = [...new Set(archiveData.map(d => d.year))];
        const ySel = document.getElementById('year');
        ySel.innerHTML = "";
        years.forEach(y => ySel.add(new Option(y, y)));

        ySel.onchange = () => {
          const mSel = document.getElementById('month');
          mSel.innerHTML = "";
          archiveData
            .filter(d => d.year === ySel.value)
            .forEach(d => {
              mSel.add(new Option(d.month, d.month));
            });
        };

        if (years.length > 0) ySel.onchange();
      } catch (e) {
        log("Failed to load archives.");
      }
    }

    document.getElementById('btnLoad').onclick = async () => {
      const u = document.getElementById('player').value;
      const y = document.getElementById('year').value;
      const m = document.getElementById('month').value;
      log(`Loading ${y}/${m}...`);
      const res = await fetch(`https://api.chess.com/pub/player/${u}/games/${y}/${m}`);
      const data = await res.json();
      const gList = document.getElementById('gameList');
      gList.innerHTML = "";
      data.games.forEach((g, i) => {
        // Change the display string to White vs Black
        const dateStr = new Date(g.end_time * 1000).toLocaleDateString();
        const matchup = `${g.white.username} vs ${g.black.username}`;
        const opt = new Option(`${dateStr}: ${matchup}`, i);

        opt.dataset.pgn = g.pgn;
        gList.add(opt);
      });
    };

    /**
 * Helper to convert a coordinate string (e.g., "g1f3 d7d5") 
 * into Algebraic Notation (e.g., "Nf3 d5") using a temporary chess instance.
 */
    function convertPvToAlgebraic(fen, pvString) {
      const tempChess = new Chess(fen);
      const moves = pvString.split(" ");
      const algebraicMoves = [];

      for (const move of moves) {
        // Construct move object for chess.js (supports promotions like e7e8q)
        const moveObj = {
          from: move.substring(0, 2),
          to: move.substring(2, 4),
          promotion: move.length === 5 ? move[4] : undefined
        };

        const result = tempChess.move(moveObj);
        if (result) {
          algebraicMoves.push(result.san);
        } else {
          break; // Stop if move is illegal
        }
      }
      return algebraicMoves.join(" ");
    }

    function evaluate(fen, depth) {
      return new Promise(async (resolve) => {
        const engine = await get_engine();
        const sideToMove = fen.split(" ")[1];
        let currentEval = 0;
        let pv = "";

        const onMsg = (e) => {
          if (e.data.startsWith("info depth") && e.data.includes("score cp")) {
            const matchCp = e.data.match(/score cp (-?\d+)/);
            const matchPv = e.data.match(/ pv (.+)/);
            if (matchCp) {
              currentEval = parseInt(matchCp[1]);
              // Perspective normalization: 
              // If it's black's turn, engine says +100 (black is better).
              // We negate it so that the score is always from White's perspective.
              if (sideToMove === 'b') currentEval = -currentEval;
            }
            if (matchPv) pv = matchPv[1];
          }
          if (e.data.startsWith("bestmove")) {
            const bestMoveUci = e.data.split(" ")[1];
            // Convert UCI to SAN for the log
            const bestMoveSan = convertPvToAlgebraic(fen, bestMoveUci).split(" ")[0];
            engine.removeEventListener("message", onMsg);
            resolve({ score: currentEval, bestMove: bestMoveUci, san: bestMoveSan, pv: pv });
          }
        };

        engine.addEventListener("message", onMsg);
        engine.postMessage(`position fen ${fen}`);
        engine.postMessage(`go depth ${depth}`);
      });
    }

    /**
     * Updates the visual evaluation bar.
     * Maps CP score to a percentage (White-centric).
     */
    function update_eval_bar(cp) {
      const fill = document.getElementById('eval-fill');
      // Normalize: +500 CP is 100% white, -500 CP is 0% white (100% black)
      // We use a sigmoid-like clamp to keep the bar useful
      let percentage = 50 + (cp / 20);
      if (percentage > 100) percentage = 100;
      if (percentage < 0) percentage = 0;

      fill.style.height = percentage + "%";
    }

    /**
 * Calculates material score: positive for white, negative for black.
 */
    function get_material_score(game) {
      const values = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
      return game.board().flat().reduce((acc, piece) => {
        if (!piece) return acc;
        const val = values[piece.type];
        return piece.color === 'w' ? acc + val : acc - val;
      }, 0);
    }

    document.getElementById('btnAnalyze').onclick = async () => {
      const sel = document.getElementById('gameList').selectedOptions[0];
      if (!sel) return alert("Select a game!");

      const currentUser = document.getElementById('player').value.toLowerCase();
      const margin = parseInt(document.getElementById('margin').value);
      const materialOnly = document.getElementById('materialOnly').checked;

      const game = new Chess();
      if (!game.load_pgn(sel.dataset.pgn)) return log("error: failed to load pgn.");

      const headers = game.header();
      const whitePlayer = (headers.White || "").toLowerCase();
      const blackPlayer = (headers.Black || "").toLowerCase();
      const history = game.history({ verbose: true });

      game.reset();
      state_.board.position('start');

      log(`--- analysis started (${materialOnly ? 'Material Only' : 'Positional + Material'}) ---`);
      let blindspotFound = false;

      for (let i = 0; i < history.length; i++) {
        const move = history[i];
        const fenBefore = game.fen();
        const side = game.turn();
        const isUserTurn = (side === 'w' && whitePlayer === currentUser) ||
          (side === 'b' && blackPlayer === currentUser);

        // 1. Engine evaluation BEFORE move
        const beforeAnalysis = await evaluate(fenBefore, 12);

        // 2. Determine engine's expected material outcome
        let engineMaterialOutcome = 0;
        if (materialOnly) {
          const engineSim = new Chess(fenBefore);
          const pvMoves = beforeAnalysis.pv.split(" ");
          // Follow engine PV for 4 half-moves to see if a capture is completed
          for (let j = 0; j < Math.min(pvMoves.length, 4); j++) {
            engineSim.move({
              from: pvMoves[j].substring(0, 2),
              to: pvMoves[j].substring(2, 4),
              promotion: 'q'
            });
          }
          engineMaterialOutcome = get_material_score(engineSim);
        }

        // 3. Player's actual move
        game.move(move);
        state_.board.position(game.fen());
        await new Promise(r => setTimeout(r, 200));

        const afterAnalysis = await evaluate(game.fen(), 12);
        update_eval_bar(afterAnalysis.score);

        // 4. Decision Logic
        let shouldFlag = false;
        let diffLabel = "";

        if (materialOnly) {
          const actualMaterial = get_material_score(game);
          const materialMissed = (side === 'w') ?
            (engineMaterialOutcome - actualMaterial) : (actualMaterial - engineMaterialOutcome);

          // Flag if you missed gaining at least one pawn (1.0)
          shouldFlag = materialMissed >= 1;
          diffLabel = `${materialMissed} Material Points`;
        } else {
          const diff = (side === 'w') ?
            (beforeAnalysis.score - afterAnalysis.score) : (afterAnalysis.score - beforeAnalysis.score);
          shouldFlag = diff >= margin;
          diffLabel = `${diff} CP`;
        }

        log(`${i + 1}: ${move.san} vs Engine ${beforeAnalysis.san}. Missed: ${diffLabel}`);

        if (isUserTurn && shouldFlag) {
          const moveUci = move.from + move.to + (move.promotion || "");
          if (moveUci !== beforeAnalysis.bestMove) {
            log(`!!! blindspot found: missed ${diffLabel}`);
            const puzzle = {
              fen: fenBefore,
              gain: diffLabel,
              side: side === 'w' ? 'white' : 'black',
              solution: convertPvToAlgebraic(fenBefore, beforeAnalysis.pv),
              id: Date.now(),
              solved: false
            };
            save_puzzle(puzzle);
            show_puzzle(puzzle);
            blindspotFound = true;
            break;
          }
        }
      }
      if (!blindspotFound) log("Analysis complete.");
    };

    function save_puzzle(p) {
      const existing = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      existing.push(p);
      localStorage.setItem('chess_puzzles', JSON.stringify(existing));
      render_saved_puzzles();
    }

    function delete_puzzle(id) {
      let existing = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      existing = existing.filter(p => p.id !== id);
      localStorage.setItem('chess_puzzles', JSON.stringify(existing));
      render_saved_puzzles();
    }

    function mark_solved(id) {
      const existing = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const puzzle = existing.find(p => p.id === id);
      if (puzzle) {
        puzzle.solved = true;
        localStorage.setItem('chess_puzzles', JSON.stringify(existing));
        render_saved_puzzles();
      }
    }

    function render_saved_puzzles() {
      const container = document.getElementById('puzzles');
      let items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');

      // Sort: unsolved (false) comes before solved (true)
      items.sort((a, b) => (a.solved === b.solved) ? 0 : a.solved ? 1 : -1);

      container.innerHTML = "<h3>Saved Puzzles</h3>";
      items.forEach(p => {
        const div = document.createElement('div');
        div.className = 'puzzle-item';
        if (p.solved) div.style.opacity = "0.6";

        div.innerHTML = `
          <div style="flex-grow:1">
            <span style="${p.solved ? 'text-decoration: line-through;' : ''}">
              ${p.side} (+${p.gain}) ${p.solved ? '✅' : ''}
            </span>
          </div>
          <div style="display:flex; gap:4px;">
            <button onclick="load_puzzle_by_id(${p.id})" style="width:auto; padding: 4px 8px; font-size: 12px;">Load</button>
            ${!p.solved ? `<button onclick="mark_solved(${p.id})" style="width:auto; padding: 4px 8px; font-size: 12px; background:#28a745">Solved</button>` : ''}
            <button onclick="delete_puzzle(${p.id})" style="width:auto; padding: 4px 8px; font-size: 12px; background:#dc3545">Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Helper to load puzzle from the list
    window.load_puzzle_by_id = (id) => {
      const items = JSON.parse(localStorage.getItem('chess_puzzles') || '[]');
      const puzzle = items.find(p => p.id === id);
      if (puzzle) show_puzzle(puzzle);
    };

    /**
         * Resets the training UI and board to the specific puzzle state.
         */
    function show_puzzle(p) {
      state_.current_puzzle = p;

      // Reset the board to the puzzle's FEN
      state_.board.position(p.fen);

      // Reset the solution text and button state
      const solDiv = document.getElementById('solutionText');
      solDiv.style.display = 'none';
      solDiv.innerHTML = "";

      const btn = document.getElementById('btnSolution');
      btn.innerHTML = "Show Solution";
      btn.style.display = 'block';
      btn.disabled = false;

      document.getElementById('hint').innerHTML = `<strong>Hint:</strong> Find ${p.side} move to gain ${p.gain}`;
    }

    /**
     * Handles both showing the solution (with animation) and resetting the board.
     */
    document.getElementById('btnSolution').onclick = async function () {
      const btn = this;
      const solDiv = document.getElementById('solutionText');
      const p = state_.current_puzzle;

      // If the button is currently in "Reset" mode
      if (btn.innerHTML === "Reset Puzzle") {
        show_puzzle(p);
        return;
      }

      // Otherwise, we are in "Show Solution" mode
      const solutionStr = p.solution;
      solDiv.style.display = 'block';
      solDiv.innerHTML = `<strong>Sequence:</strong> ${solutionStr}`;

      const tempGame = new Chess(p.fen);
      const moveSequence = solutionStr.split(" ");
      let moveIndex = 0;

      btn.disabled = true; // Prevent double-clicking during animation

      const playbackInterval = setInterval(() => {
        if (moveIndex >= moveSequence.length) {
          clearInterval(playbackInterval);
          btn.disabled = false;
          btn.innerHTML = "Reset Puzzle"; // Change button text after animation
          return;
        }

        const res = tempGame.move(moveSequence[moveIndex]);
        if (res) {
          state_.board.position(tempGame.fen());
          moveIndex++;
        } else {
          clearInterval(playbackInterval);
          btn.disabled = false;
        }
      }, 800);
    };

    window.onload = init;
  </script>
</body>

</html>
